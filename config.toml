# =============================================================================
# TETR.IO ESP Overlay Configuration — 1920x1080 Borderless Windowed
# =============================================================================
# Calibrated from actual TETR.IO screenshot. Default skin, minimal graphics.

[capture]
x = 0
y = 0
width = 1920
height = 1080
target_fps = 60

[vision]
# Board grid: top-left corner of cell (0,0). Cell size 45px.
# Verified via edge detection and grid overlay tool.
board_x = 733
board_y = 86
cell_size = 45

# Hold piece: center of the piece displayed in the HOLD box.
hold_x = 618
hold_y = 190

# Next queue: center of a representative cell for each preview piece.
# 5 preview pieces, sampled at x=1310 (center of NEXT box).
next_positions = [
    [1310, 218],
    [1310, 354],
    [1310, 467],
    [1310, 603],
    [1310, 717],
]

color_tolerance = 40

# Minimum fraction of non-empty board cells that must have strong (>=3/5) sample
# agreement before trusting the board state to the AI.
# 0.0 = always trust (not recommended), 1.0 = require all cells to agree perfectly.
# If confidence drops below this, the ghost overlay clears and a warning appears.
# Lower this (e.g. 0.5) if you get frequent "CHECK CALIBRATION" warnings on a
# correctly-calibrated setup — can happen on busy boards with anti-aliasing.
confidence_threshold = 0.7

[ai]
playstyle = "aggressive"   # Options: balanced, aggressive, defensive, tspin
max_nodes = 200000       # More nodes = stronger but slower (default 400k)
min_nodes = 0
# Movement mode: "hard_drop_only" = move/rotate at spawn then hard drop (safest),
#                "twenty_g"       = ground-level moves,
#                "zero_g"         = tucks & spins (requires SDF infinity)
movement_mode = "hard_drop_only"

[overlay]
# Ghost piece opacity (0-255). Lower = more transparent.
ghost_opacity = 120

[hotkeys]
# F9 = Start/Stop (0x78), F10 = Pause/Resume (0x79)
vk_toggle = 0x78
vk_pause = 0x79
